services:
  # Konnecct CRM Services
  crm-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: default
    volumes:
      - crm-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres
      interval: 5s
    restart: always

  crm-redis:
    image: redis:7-alpine
    volumes:
      - crm-redis-data:/data
    restart: always

  crm-server:
    build:
      context: .
      target: twenty
      dockerfile: packages/twenty-docker/twenty/Dockerfile
    depends_on:
      crm-db:
        condition: service_healthy
      crm-redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PG_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@crm-db:5432/default
      REDIS_URL: redis://crm-redis:6379
      SERVER_URL: https://app.konnecct.com
      FRONT_URL: https://app.konnecct.com
      NODE_PORT: 3000
      APP_SECRET: ${APP_SECRET:-konnecct-secret-6789}
      STORAGE_TYPE: local
      APP_VERSION: 11.7.0
    restart: always

  crm-worker:
    image: konnecctremake-crm-server
    command: ["node", "dist/queue-worker/queue-worker"]
    depends_on:
      crm-db:
        condition: service_healthy
      crm-redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PG_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@crm-db:5432/default
      REDIS_URL: redis://crm-redis:6379
      SERVER_URL: https://app.konnecct.com
      FRONT_URL: https://app.konnecct.com
      NODE_PORT: 3000
      APP_SECRET: ${APP_SECRET:-konnecct-secret-6789}
      STORAGE_TYPE: local
      APP_VERSION: 11.7.0
    restart: always

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certbot-etc:/etc/letsencrypt:ro
      - ./nginx/certbot-www:/var/www/certbot:ro
    depends_on:
      - crm-server
    restart: always

  # Certbot (SSL Renewal)
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./nginx/certbot-etc:/etc/letsencrypt:rw
      - ./nginx/certbot-www:/var/www/certbot:rw
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: always

volumes:
  crm-postgres-data:
  crm-redis-data:
