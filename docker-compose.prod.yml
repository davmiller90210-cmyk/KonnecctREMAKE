services:
  # Konnecct CRM Services
  crm-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: default
    volumes:
      - crm-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres
      interval: 5s
    restart: always

  crm-redis:
    image: redis:7-alpine
    volumes:
      - crm-redis-data:/data
    restart: always

  crm-server:
    build:
      context: .
      target: twenty
      dockerfile: packages/twenty-docker/twenty/Dockerfile
    depends_on:
      crm-db:
        condition: service_healthy
      crm-redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    environment:
      NODE_ENV: production
      PG_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@crm-db:5432/default
      REDIS_URL: redis://crm-redis:6379
      SERVER_URL: https://app.konnecct.com
      FRONT_URL: https://app.konnecct.com
      NODE_PORT: 3000
      APP_SECRET: ${APP_SECRET:-konnecct-secret-6789}
      STORAGE_TYPE: local
      APP_VERSION: 11.7.0
      AGORA_APP_ID: ${AGORA_APP_ID:-c40d7b366062426e8cfcf1eba9e84194}
      AGORA_APP_CERTIFICATE: ${AGORA_APP_CERTIFICATE:-08feb4e9c80a471cae8744b61076acfe}
      AGORA_CHAT_ORG_NAME: ${AGORA_CHAT_ORG_NAME:-7110032205}
      AGORA_CHAT_APP_NAME: ${AGORA_CHAT_APP_NAME:-200010602}
      AGORA_CHAT_REST_HOST: ${AGORA_CHAT_REST_HOST:-a71.chat.agora.io}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      REACT_APP_CLERK_PUBLISHABLE_KEY: ${REACT_APP_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    restart: always

  crm-worker:
    image: konnecctremake-crm-server
    command: ["node", "dist/queue-worker/queue-worker"]
    depends_on:
      crm-db:
        condition: service_healthy
      crm-redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PG_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@crm-db:5432/default
      REDIS_URL: redis://crm-redis:6379
      SERVER_URL: https://app.konnecct.com
      FRONT_URL: https://app.konnecct.com
      NODE_PORT: 3000
      APP_SECRET: ${APP_SECRET:-konnecct-secret-6789}
      STORAGE_TYPE: local
      APP_VERSION: 11.7.0
      AGORA_APP_ID: ${AGORA_APP_ID:-c40d7b366062426e8cfcf1eba9e84194}
      AGORA_APP_CERTIFICATE: ${AGORA_APP_CERTIFICATE:-08feb4e9c80a471cae8744b61076acfe}
      AGORA_CHAT_ORG_NAME: ${AGORA_CHAT_ORG_NAME:-7110032205}
      AGORA_CHAT_APP_NAME: ${AGORA_CHAT_APP_NAME:-200010602}
      AGORA_CHAT_REST_HOST: ${AGORA_CHAT_REST_HOST:-a71.chat.agora.io}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      REACT_APP_CLERK_PUBLISHABLE_KEY: ${REACT_APP_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    restart: always

  # Rocket.Chat (proxied at https://app.konnecct.com/communications/ — see nginx.conf)
  rocketchat-mongo:
    image: mongo:6.0
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - rocketchat-mongo-data:/data/db
    restart: always

  rocketchat-mongo-init:
    image: mongo:6.0
    depends_on:
      rocketchat-mongo:
        condition: service_started
    restart: on-failure
    entrypoint:
      - bash
      - -c
      - |
        set -e
        for i in $$(seq 1 40); do
          mongosh "mongodb://rocketchat-mongo:27017" --eval "db.runCommand({ ping: 1 })" && break
          sleep 3
        done
        mongosh "mongodb://rocketchat-mongo:27017" --eval 'try { rs.status() } catch (e) { rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "rocketchat-mongo:27017" }] }) }'

  rocketchat:
    image: rocketchat/rocket.chat:latest
    depends_on:
      rocketchat-mongo-init:
        condition: service_completed_successfully
    environment:
      ROOT_URL: https://app.konnecct.com/communications/
      MONGO_URL: mongodb://rocketchat-mongo:27017/rocketchat?replicaSet=rs0
      PORT: "3000"
    expose:
      - "3000"
    restart: always

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certbot-etc:/etc/letsencrypt:ro
      - ./nginx/certbot-www:/var/www/certbot:ro
    depends_on:
      - crm-server
      - rocketchat
    restart: always

  # Certbot (SSL Renewal)
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./nginx/certbot-etc:/etc/letsencrypt:rw
      - ./nginx/certbot-www:/var/www/certbot:rw
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: always

volumes:
  crm-postgres-data:
  crm-redis-data:
  rocketchat-mongo-data:
