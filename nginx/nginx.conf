events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 100M;

    # Redirect HTTP to HTTPS & handle Certbot challenge
    server {
        listen 80;
        server_name app.konnecct.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name app.konnecct.com;

        ssl_certificate /etc/letsencrypt/live/app.konnecct.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.konnecct.com/privkey.pem;

        # Standard SSL security params
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        # Konnecct CRM (Master Entry Point)
        location / {
            proxy_pass http://crm-server:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Ensure the CRM Gateway handles everything internally
            proxy_buffering off;
            proxy_read_timeout 600s;
        }

        # DOUBLE-PREFIX FIX: Catch Rocket.Chat's client SDK relative path bug where it requests /rc-proxy/rc-proxy/...
        location /rc-proxy/rc-proxy/ {
            # Rewrite double to single and preserve POST method unconditionally
            rewrite ^/rc-proxy/rc-proxy/(.*)$ /rc-proxy/$1 break;
            proxy_pass http://rocketchat:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Nginx-Proxy true;
            proxy_redirect off;
        }

        # THE RC-PROXY ELEVATION: Direct routing for Rocket.Chat HTML/WebApp
        location /rc-proxy/ {
            # EXPLICIT PASS: Ensure URI exactly matches ROOT_URL prefix for Meteor WebApp
            proxy_pass http://rocketchat:3000/rc-proxy/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Nginx-Proxy true;
            proxy_redirect off;
        }

        # Greedy Asset Catch-all (Bridge stray connections to Rocket.Chat subpath)
        location ~ ^/(file/|avatar/|core-picture|__meteor_runtime_config__.js|enc.js|api/v1/|sockjs/) {
            # Prepend the prefix so Meteor's internal router accepts it
            proxy_pass http://rocketchat:3000/rc-proxy$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
