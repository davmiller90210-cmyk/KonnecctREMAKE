events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 100M;

    # Redirect HTTP to HTTPS & handle Certbot challenge
    server {
        listen 80;
        server_name app.konnecct.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name app.konnecct.com;

        ssl_certificate /etc/letsencrypt/live/app.konnecct.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.konnecct.com/privkey.pem;

        # Standard SSL security params
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        # Konnecct CRM (Default)
        location / {
            proxy_pass http://crm-server:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Rocket.Chat - High Priority API & Method Bridge (Fixes 405)
        location ~ ^/chat/api/v1/method\.callAnon {
            proxy_pass http://rocketchat:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /chat;
            
            # Explicitly allow methods
            proxy_method $request_method;
            proxy_buffering off;
        }

        # Rocket.Chat - SockJS & WebSocket Handshake
        location ~ ^/chat/sockjs {
            proxy_pass http://rocketchat:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_buffering off;
            proxy_read_timeout 600s;
        }

        # Rocket.Chat - General Subpath Proxy
        location /chat/ {
            proxy_pass http://rocketchat:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /chat;
            
            proxy_buffering off;
            proxy_read_timeout 600s;
        }

        # Greedy Asset Catch-all (to prevent leaks)
        location ~ ^/(file/|avatar/|core-picture|__meteor_runtime_config__.js) {
            proxy_pass http://rocketchat:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
