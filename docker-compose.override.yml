version: '3.8'

services:
  twenty-front:
    build:
      context: .
      dockerfile: packages/twenty-docker/twenty-app-dev/Dockerfile.dev
      target: dev
    volumes:
      - ./packages/twenty-front/src:/app/packages/twenty-front/src
      - ./packages/twenty-ui/src:/app/packages/twenty-ui/src
      - ./packages/twenty-shared/src:/app/packages/twenty-shared/src
    ports:
      - "3001:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:3000
    depends_on:
      - twenty-server

  twenty-server:
    build:
      context: .
      dockerfile: packages/twenty-docker/twenty-app-dev/Dockerfile.dev
      target: dev
    volumes:
      - ./packages/twenty-server/src:/app/packages/twenty-server/src
      - ./packages/twenty-shared/src:/app/packages/twenty-shared/src
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PG_DATABASE_URL: postgres://postgres:postgres@postgres:5432/default
      REDIS_URL: redis://redis:6379
      SERVER_URL: http://localhost:3000
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: default
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
