services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: default
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
      - "5173:5173"
    volumes:
      - ./packages/twenty-server/src:/app/packages/twenty-server/src
      - ./packages/twenty-front/src:/app/packages/twenty-front/src
      - ./packages/twenty-ui/src:/app/packages/twenty-ui/src
      - ./packages/twenty-shared/src:/app/packages/twenty-shared/src
      - /app/node_modules
    environment:
      NODE_ENV: development
      PG_DATABASE_URL: postgres://postgres:postgres@postgres:5432/default
      REDIS_URL: redis://redis:6379
      SERVER_URL: http://localhost:3000
      APP_SECRET: dev-secret-key
      VITE_API_BASE_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
