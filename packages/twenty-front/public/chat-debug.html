<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Connection Debug</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; background: #111; color: #eee; }
        .log-entry { margin-bottom: 10px; padding: 10px; border-radius: 4px; border-left: 4px solid #444; }
        .SUCCESS { border-color: #4caf50; background: #1b2e1b; }
        .ERROR { border-color: #f44336; background: #321c1c; }
        .INFO { border-color: #2196f3; background: #1c2332; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #2196f3; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Matrix Connection Diagnostic</h1>
    <p>This tool manually tests the steps required to connect to the Chat Hub.</p>
    <button onclick="runDiagnostic()">Run Diagnostic</button>
    <div id="logs" style="margin-top: 20px;"></div>

    <script>
        const logsDiv = document.getElementById('logs');
        function log(message, type = 'INFO') {
            const div = document.createElement('div');
            div.className = `log-entry ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsDiv.appendChild(div);
            console.log(`[${type}] ${message}`);
        }

        async function runDiagnostic() {
            logsDiv.innerHTML = '';
            log('Starting diagnostic...', 'INFO');

            // 1. Check CRM Session
            const cookies = document.cookie;
            if (!cookies.includes('accessToken')) {
                log('WARNING: No accessToken found in cookies. This test might fail if you are not logged in to the CRM.', 'ERROR');
            } else {
                log('CRM session cookies detected.', 'SUCCESS');
            }

            // 2. Test Matrix Token Endpoint
            log('Step 1: Fetching Matrix token from /matrix/token...', 'INFO');
            try {
                // Fetching the current token from cookies to pass as Bearer
                // In production, the browser adds these automatically if configured, 
                // but for this debug tool we'll try to find it.
                const response = await fetch('/matrix/token');
                
                if (response.status === 401) {
                    log('ERROR: /matrix/token returned 401 (Unauthorized). Your CRM session expired or the manual JWT fix failed.', 'ERROR');
                    return;
                }

                if (!response.ok) {
                    log(`ERROR: /matrix/token failed with status ${response.status}.`, 'ERROR');
                    const text = await response.text();
                    log(`Server response: ${text.substring(0, 200)}`, 'ERROR');
                    return;
                }

                const data = await response.json();
                log('SUCCESS: Matrix token received!', 'SUCCESS');
                log(`User ID: ${data.userId}`, 'INFO');
                log(`Homeserver: ${data.homeserverUrl}`, 'INFO');
                
                // 3. Test Synapse Connectivity
                log('Step 2: Pinging Synapse homeserver at /_matrix/client/versions...', 'INFO');
                const synapseResponse = await fetch('/_matrix/client/versions');
                if (synapseResponse.ok) {
                    const versions = await synapseResponse.json();
                    log(`SUCCESS: Synapse responded! Supported versions: ${versions.versions.join(', ')}`, 'SUCCESS');
                } else {
                    log(`ERROR: Synapse did not respond correctly to /_matrix/client/versions (Status: ${synapseResponse.status})`, 'ERROR');
                }

                log('Step 3: Attempting light Matrix login check...', 'INFO');
                const loginCheck = await fetch('/_matrix/client/v3/login', {
                    method: 'GET'
                });
                if (loginCheck.ok) {
                    log('SUCCESS: Matrix login flows are accessible.', 'SUCCESS');
                } else {
                   log('WARNING: Matrix login endpoint returned error, but this is sometimes normal for GET.', 'INFO');
                }

            } catch (err) {
                log(`CRITICAL ERROR during diagnostic: ${err.message}`, 'ERROR');
            }
        }
    </script>
</body>
</html>
